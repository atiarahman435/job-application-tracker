<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Job Application Tracker</h1>

    <!-- Available Jobs Header -->
    <h2 class="section-header">
      <span>Available Jobs</span>
      <span id="tabCountText">0 jobs</span>
    </h2>

    <!-- Tabs -->
    <div class="tabs">
      <button data-tab="all" class="tabBtn">All</button>
      <button data-tab="interview" class="tabBtn">Interview</button>
      <button data-tab="rejected" class="tabBtn">Rejected</button>
    </div>

    <!-- Empty State -->
    <div id="emptyState" style="display: none">
      <div class="empty-icon">📄</div>
      <h3>No jobs available</h3>
      <p>Check back soon for new job opportunities</p>
    </div>

    <!-- Jobs Container -->
    <div id="jobsContainer"></div>

    <script src="script.js"></script>
  </body>
</html>
